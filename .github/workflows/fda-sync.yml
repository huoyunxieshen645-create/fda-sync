name: FDA Daily Data Sync

on:
  schedule:
    # 每天早上 8:00 UTC = 16:00 北京时间
    - cron: '0 8 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  fda-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Fetch FDA 483 (from known PDF URLs)
        working-directory: .github/scripts
        run: |
          python3 fetch_483_pdfs.py

      - name: Fetch FDA Warning Letters
        working-directory: .github/scripts
        run: |
          python3 fetch_warning_letters.py

      - name: Update knowledge database
        working-directory: .github/scripts
        run: |
          python3 update_db.py

      - name: Commit updated data
        run: |
          git config user.name "fda-bot"
          git config user.email "fda-bot@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "auto: FDA data sync $(date +'%Y-%m-%d')"
          git push
